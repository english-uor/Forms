<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستەمی پێشبینینی فۆڕمە فەرمییەکان</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap');
    body { font-family: 'Noto Kufi Arabic', sans-serif; background-color: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

  <div class="w-full max-w-6xl bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden flex flex-col md:flex-row h-[85vh]">
    
    <div class="w-full md:w-5/12 border-l border-slate-100 flex flex-col h-full bg-slate-50/50">
      
      <div class="p-4 border-b border-slate-100 bg-white space-y-3">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">📂 پۆرتاڵی فۆڕمەکان</h2>
        
        <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-lg">
          <button id="btn-all-view" onclick="switchView('all')" class="py-1.5 px-3 rounded-md text-sm font-semibold transition bg-white text-blue-600 shadow-sm">هەموو فۆڕمەکان</button>
          <button id="btn-cat-view" onclick="switchView('cat')" class="py-1.5 px-3 rounded-md text-sm font-semibold transition text-slate-600 hover:bg-slate-200/50">پۆلەکان</button>
        </div>

        <input type="text" id="search-bar" oninput="filterForms()" placeholder="گەڕان لە ناوی فۆڕمدا بکە..." class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
      </div>

      <div id="list-container" class="flex-1 overflow-y-auto p-4 custom-scrollbar">
        <div class="text-center py-8 text-slate-400">خەریکی بارکردنی زانیارییەکانە...</div>
      </div>

      <div id="dept-widget" class="hidden p-4 border-t border-slate-100 bg-white space-y-3">
        <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100 space-y-2">
          <h4 class="text-xs font-bold text-blue-800">✉️ ڕەوانەکردن بۆ بەشەکانی خوێندن</h4>
          <select id="dept-selector" class="w-full px-3 py-2 text-xs rounded-md border border-slate-200 focus:outline-none bg-white"></select>
          
          <div id="code-area" class="hidden">
            <input type="password" id="access-code" placeholder="کۆدی دەستگەیشتن بنووسە" class="w-full px-3 py-1.5 text-xs rounded-md border border-slate-200 focus:outline-none">
          </div>

          <button onclick="sendToDepartment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 rounded-md transition shadow-sm flex justify-center items-center gap-2">
            <span id="send-btn-text">ناردنی فۆڕمی دەستنیشانکراو</span>
          </button>
          <div id="action-status" class="text-[11px] text-center font-medium min-h-[16px]"></div>
        </div>
      </div>

    </div>

    <div class="hidden md:flex flex-1 flex-col h-full bg-slate-900 text-white relative justify-center items-center">
      <div id="preview-placeholder" class="text-slate-400 space-y-2 text-center p-4">
        <span class="text-4xl block">📄</span>
        <p class="text-sm">تکایە فۆڕمێک دیاری بکە بۆ پێشبینیکردن</p>
      </div>
      <iframe id="viewer-frame" class="w-full h-full hidden" src="" frameborder="0"></iframe>
    </div>

  </div>

  <script>
    // Paste your Google Apps Script Web App URL exactly inside quotes below
    const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbx4G6gUByxfFaoy5wKARLr0Pu3A6x0hukVCZcWs3d6DFozIr9ppa3iGbne7lpNXv7jnhg/exec";

    let globalData = { forms: [], departments: [], settings: {} };
    let currentActiveView = 'all';
    let selectedFormId = null;

    document.addEventListener("DOMContentLoaded", fetchInitialState);

    async function fetchInitialState() {
      try {
        const res = await fetch(API_ENDPOINT);
        globalData = await res.json();
        
        if(globalData.settings.Enable_Dept_Email === "Yes") {
          document.getElementById('dept-widget').classList.remove('hidden');
          populateDepartments(globalData.departments);
          if(globalData.settings.Require_Code) {
            document.getElementById('code-area').classList.remove('hidden');
          }
        }
        renderView();
      } catch (err) {
        document.getElementById('list-container').innerHTML = `<div class="text-red-500 text-center text-xs">کێشەیەک لە پەیوەندی هەیە!</div>`;
      }
    }

    function populateDepartments(depts) {
      const selector = document.getElementById('dept-selector');
      selector.innerHTML = depts.map(d => `<option value="${d.email}">${d.name}</option>`).join('');
    }

    function switchView(viewType) {
      currentActiveView = viewType;
      document.getElementById('btn-all-view').className = viewType === 'all' ? 'py-1.5 px-3 rounded-md text-sm font-semibold transition bg-white text-blue-600 shadow-sm' : 'py-1.5 px-3 rounded-md text-sm font-semibold transition text-slate-600 hover:bg-slate-200/50';
      document.getElementById('btn-cat-view').className = viewType === 'cat' ? 'py-1.5 px-3 rounded-md text-sm font-semibold transition bg-white text-blue-600 shadow-sm' : 'py-1.5 px-3 rounded-md text-sm font-semibold transition text-slate-600 hover:bg-slate-200/50';
      renderView();
    }

    function renderView() {
      const query = document.getElementById('search-bar').value.toLowerCase().trim();
      const filtered = globalData.forms.filter(f => f.name.toLowerCase().includes(query));
      const container = document.getElementById('list-container');
      
      if(filtered.length === 0) {
        container.innerHTML = `<div class="text-center text-slate-400 text-xs py-6">هیچ فۆڕمێک نەدۆزرایەوە</div>`;
        return;
      }

      if (currentActiveView === 'all') {
        container.innerHTML = `<div class="space-y-1">${filtered.map(f => createFormRow(f)).join('')}</div>`;
      } else {
        const groups = filtered.reduce((acc, f) => { (acc[f.category] = acc[f.category] || []).push(f); return acc; }, {});
        container.innerHTML = Object.entries(groups).map(([catName, items]) => `
          <div class="mb-4">
            <h3 class="text-xs font-bold text-slate-400 mb-2 sticky top-0 bg-slate-50 py-1 z-10">${catName}</h3>
            <div class="space-y-1">${items.map(f => createFormRow(f)).join('')}</div>
          </div>
        `).join('');
      }
    }

    function createFormRow(f) {
      const isActive = selectedFormId === f.id ? 'border-blue-500 bg-blue-50/40' : 'border-slate-100 bg-white hover:border-slate-300';
      return `
        <div onclick="selectForm(${f.id}, '${f.pdf}')" class="p-3 border rounded-xl flex items-center justify-between cursor-pointer transition ${isActive}">
          <div class="flex items-center gap-2 overflow-hidden">
            <span class="text-lg flex-shrink-0">${f.emoji || '📄'}</span>
            <span class="text-xs font-semibold text-slate-700 truncate">${f.name}</span>
          </div>
          <div class="flex gap-1 flex-shrink-0" onclick="event.stopPropagation();">
            <a href="${f.pdf}" target="_blank" class="px-2 py-1 text-[10px] bg-red-50 text-red-600 font-bold rounded-md hover:bg-red-100 transition">PDF</a>
            ${f.word ? `<a href="${f.word}" target="_blank" class="px-2 py-1 text-[10px] bg-blue-50 text-blue-600 font-bold rounded-md hover:bg-blue-100 transition">Word</a>` : ''}
          </div>
        </div>`;
    }

    function filterForms() { renderView(); }

    function selectForm(id, pdfUrl) {
      selectedFormId = id;
      renderView();
      
      document.getElementById('preview-placeholder').classList.add('hidden');
      const frame = document.getElementById('viewer-frame');
      frame.classList.remove('hidden');
      frame.src = pdfUrl.replace('/view', '/preview');
    }

    async function sendToDepartment() {
      const status = document.getElementById('action-status');
      const btnText = document.getElementById('send-btn-text');
      
      if(selectedFormId === null) {
        status.className = "text-[11px] text-center font-medium min-h-[16px] text-red-500";
        status.innerText = "تکایە سەرەتا فۆڕمێک لە لیستی سەرەوە دیاری بکە";
        return;
      }

      const email = document.getElementById('dept-selector').value;
      const code = document.getElementById('access-code') ? document.getElementById('access-code').value : "";

      btnText.innerText = "خەریکی پرۆسەسەکەیە...";
      status.innerText = "";

      try {
        const res = await fetch(API_ENDPOINT, {
          method: "POST",
          body: JSON.stringify({ formId: selectedFormId, deptEmail: email, code: code })
        });
        const result = await res.json();
        
        status.className = `text-[11px] text-center font-medium min-h-[16px] ${result.success ? 'text-green-600' : 'text-red-500'}`;
        status.innerText = result.message;
        if(result.success && document.getElementById('access-code')) document.getElementById('access-code').value = "";
      } catch (err) {
        status.className = "text-[11px] text-center font-medium min-h-[16px] text-red-500";
        status.innerText = "هەڵەیەک لە سێرڤەر ڕوویدا";
      } finally {
        btnText.innerText = "ناردنی فۆڕمی دەستنیشانکراو";
      }
    }
  </script>
</body>
</html>
