<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>فۆڕمە فەرمییەکان</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap');
    body { font-family: 'Noto Kufi Arabic', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="h-screen w-full flex flex-col md:flex-row overflow-hidden bg-white md:bg-transparent md:p-6 lg:p-10 relative">

  <div class="w-full h-full md:max-w-7xl md:mx-auto bg-white md:rounded-3xl md:shadow-2xl overflow-hidden flex flex-col md:flex-row border-slate-200 md:border">
    
    <div class="w-full md:w-5/12 border-l border-slate-100 flex flex-col h-full bg-slate-50 z-10">
      
      <div class="p-4 md:p-5 bg-white border-b border-slate-100 shadow-sm z-20 space-y-4">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">📂 پۆرتاڵی فۆڕمەکان</h2>
        
        <div class="grid grid-cols-2 gap-1 bg-slate-100 p-1.5 rounded-xl">
          <button id="btn-all-view" onclick="switchMainView('all')" class="py-2 px-3 rounded-lg text-sm font-bold transition bg-white text-blue-600 shadow-sm">هەمووی</button>
          <button id="btn-cat-view" onclick="switchMainView('cat')" class="py-2 px-3 rounded-lg text-sm font-bold transition text-slate-500 hover:bg-slate-200/50">پۆلەکان</button>
        </div>

        <div class="relative">
          <input type="text" id="search-bar" oninput="filterForms()" placeholder="بگەڕێ بۆ فۆڕم..." class="w-full px-4 py-3 pl-10 text-sm rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/30 transition">
        </div>
      </div>

      <div id="list-container" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
        <div class="text-center py-10 text-slate-400 text-sm flex flex-col items-center gap-2">
           <svg class="animate-spin h-6 w-6 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
           بارکردن...
        </div>
      </div>
    </div>

    <div class="hidden md:flex flex-1 flex-col h-full bg-slate-100 relative">
      <div id="desktop-preview-header" class="hidden p-4 bg-white border-b border-slate-200 flex justify-between items-center shadow-sm z-10">
        <h3 id="desktop-preview-title" class="font-bold text-slate-800 text-lg truncate pr-2"></h3>
        <button onclick="openSendModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-md transition flex items-center gap-2">
          ناردنی ئەم فۆڕمە ✉️
        </button>
      </div>

      <div class="flex-1 w-full bg-slate-800 flex items-center justify-center relative">
        <div id="preview-placeholder" class="text-slate-400 space-y-3 text-center p-6 absolute">
          <span class="text-6xl block opacity-50">📄</span>
          <p class="text-lg font-semibold">فۆڕمێک دیاری بکە بۆ پێشبینیکردن</p>
        </div>
        <iframe id="viewer-frame" class="w-full h-full hidden rounded-br-3xl" src="" frameborder="0"></iframe>
      </div>
    </div>

  </div>

  <div id="mobile-preview-modal" class="fixed inset-0 bg-slate-900 z-[60] flex flex-col transition-transform duration-300 transform translate-y-full md:hidden">
    <div class="flex justify-between items-center p-4 bg-slate-800 text-white shadow-md z-10">
      <h3 class="text-sm font-bold truncate pr-2 flex-1" id="mobile-preview-title">پێشبینیکردنی فۆڕم</h3>
      <button onclick="closeMobilePreview()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-xs font-bold transition flex-shrink-0">داخستن ✕</button>
    </div>
    <div class="flex-1 w-full bg-slate-100 overflow-hidden relative">
      <iframe id="mobile-viewer-frame" class="w-full h-full absolute inset-0" src="" frameborder="0"></iframe>
    </div>
    <div class="p-4 bg-white border-t border-slate-200 z-10">
      <button onclick="closeMobilePreviewAndOpenSend()" class="w-full bg-blue-600 active:bg-blue-800 text-white text-sm font-bold py-3.5 rounded-xl shadow-md">
        ناردنی ئەم فۆڕمە ✉️
      </button>
    </div>
  </div>

  <div id="send-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="send-modal-content">
      
      <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
        <h3 class="font-bold text-slate-800 text-lg">✉️ پەنجەرەی ناردن</h3>
        <button onclick="closeSendModal()" class="text-slate-400 hover:text-red-500 bg-slate-200 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center transition font-bold">✕</button>
      </div>
      
      <div class="p-5 space-y-5">
        <div class="flex gap-1 bg-slate-100 p-1.5 rounded-xl">
          <button onclick="switchSendMode('custom')" id="mode-custom" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white text-blue-600 shadow-sm transition">ئیمەیلی خۆت</button>
          <button onclick="switchSendMode('dept')" id="mode-dept" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition hidden">بەشەکان</button>
        </div>

        <div id="area-custom" class="space-y-2">
          <label class="text-xs font-bold text-slate-500 px-1">ئیمەیلی وەرگر بنووسە</label>
          <input type="email" id="input-custom-email" dir="ltr" placeholder="example@email.com" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-left bg-slate-50 focus:bg-white transition">
        </div>

        <div id="area-dept" class="space-y-4 hidden">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-500 px-1">بەشی پەیوەندیدار هەڵبژێرە</label>
            <select id="dept-selector" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none transition"></select>
          </div>
          <div id="code-area" class="hidden space-y-2">
            <label class="text-xs font-bold text-slate-500 px-1">کۆدی دەستگەیشتن (نهێنی)</label>
            <input type="password" id="access-code" placeholder="کۆد لێرە بنووسە..." dir="ltr" class="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-left bg-slate-50 focus:bg-white transition">
          </div>
        </div>

        <div id="action-status" class="text-sm text-center font-bold min-h-[20px]"></div>
        
        <button onclick="submitEmail()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30 flex justify-center items-center">
          <span id="send-btn-text">بەردەوام بە بۆ ناردن</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ دڵنیابە لە دانانی لینکی دروستی WEB APP ی خۆت لێرە
    const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbwCzuCS-B93X5Qn9YkBemW45qhBPq7y99Z0ljDKk0fN3_gYIyYI1EGg2dpmQbJSmToZ1g/exec";

    let globalData = { forms: [], departments: [], settings: {} };
    let currentMainView = 'all';
    let currentSendMode = 'custom';
    let selectedFormId = null;

    document.addEventListener("DOMContentLoaded", fetchInitialState);

    async function fetchInitialState() {
      try {
        const res = await fetch(API_ENDPOINT);
        globalData = await res.json();
        
        if(globalData.settings.Enable_Dept_Email === "Yes") {
          document.getElementById('mode-dept').classList.remove('hidden');
          const selector = document.getElementById('dept-selector');
          selector.innerHTML = globalData.departments.map(d => `<option value="${d.email}">${d.name}</option>`).join('');
          
          if(globalData.settings.Require_Code) {
            document.getElementById('code-area').classList.remove('hidden');
          }
        }
        renderFormsList();
      } catch (err) {
        document.getElementById('list-container').innerHTML = `<div class="text-red-500 font-bold text-center text-sm p-4">کێشە لە هێنانی داتاکان هەیە، پەیوەندی ئینتەرنێتەکەت بپشکنە!</div>`;
      }
    }

    function switchMainView(viewType) {
      currentMainView = viewType;
      document.getElementById('btn-all-view').className = viewType === 'all' ? 'py-2 px-3 rounded-lg text-sm font-bold transition bg-white text-blue-600 shadow-sm' : 'py-2 px-3 rounded-lg text-sm font-bold transition text-slate-500 hover:bg-slate-200/50';
      document.getElementById('btn-cat-view').className = viewType === 'cat' ? 'py-2 px-3 rounded-lg text-sm font-bold transition bg-white text-blue-600 shadow-sm' : 'py-2 px-3 rounded-lg text-sm font-bold transition text-slate-500 hover:bg-slate-200/50';
      renderFormsList();
    }

    function switchSendMode(mode) {
      currentSendMode = mode;
      document.getElementById('mode-custom').className = mode === 'custom' ? 'flex-1 py-2 text-sm font-bold rounded-lg bg-white text-blue-600 shadow-sm transition' : 'flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition hover:bg-slate-200/50';
      document.getElementById('mode-dept').className = mode === 'dept' ? 'flex-1 py-2 text-sm font-bold rounded-lg bg-white text-blue-600 shadow-sm transition' : 'flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition hover:bg-slate-200/50';
      
      document.getElementById('area-custom').classList.toggle('hidden', mode !== 'custom');
      document.getElementById('area-dept').classList.toggle('hidden', mode !== 'dept');
    }

    function openSendModal() {
      const modal = document.getElementById('send-modal');
      const content = document.getElementById('send-modal-content');
      document.getElementById('action-status').innerText = ""; // clear old statuses
      
      modal.classList.remove('hidden');
      // trigger reflow for smooth animation
      void modal.offsetWidth; 
      modal.classList.remove('opacity-0');
      content.classList.remove('scale-95');
    }

    function closeSendModal() {
      const modal = document.getElementById('send-modal');
      const content = document.getElementById('send-modal-content');
      
      modal.classList.add('opacity-0');
      content.classList.add('scale-95');
      setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    function renderFormsList() {
      const query = document.getElementById('search-bar').value.toLowerCase().trim();
      const filtered = globalData.forms.filter(f => f.name.toLowerCase().includes(query));
      const container = document.getElementById('list-container');
      
      if(filtered.length === 0) {
        container.innerHTML = `<div class="text-center text-slate-400 font-bold text-sm py-10">فۆڕم نەدۆزرایەوە!</div>`;
        return;
      }

      if (currentMainView === 'all') {
        container.innerHTML = filtered.map(f => createFormHTML(f)).join('');
      } else {
        const groups = filtered.reduce((acc, f) => { (acc[f.category] = acc[f.category] || []).push(f); return acc; }, {});
        container.innerHTML = Object.entries(groups).map(([catName, items]) => `
          <div class="mb-5">
            <h3 class="text-xs font-bold text-slate-400 mb-2 sticky top-0 bg-slate-50/90 backdrop-blur-sm py-1 z-10">${catName}</h3>
            <div class="space-y-2">${items.map(f => createFormHTML(f)).join('')}</div>
          </div>
        `).join('');
      }
    }

    function createFormHTML(f) {
      const isActive = selectedFormId === f.id ? 'border-blue-500 bg-blue-50 shadow-sm scale-[1.01]' : 'border-slate-200 bg-white hover:border-slate-300';
      const safeName = f.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
      return `
        <div onclick="selectForm(${f.id}, '${f.pdf}', '${safeName}')" class="p-3 md:p-4 border rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-3 cursor-pointer transition-all duration-200 ${isActive}">
          <div class="flex items-center gap-3 overflow-hidden">
            <span class="text-2xl bg-white w-10 h-10 flex items-center justify-center rounded-xl shadow-sm border border-slate-100 flex-shrink-0">${f.emoji || '📄'}</span>
            <span class="text-sm font-bold text-slate-700 leading-tight">${f.name}</span>
          </div>
          <div class="flex gap-2 flex-shrink-0" onclick="event.stopPropagation();">
            <a href="${f.pdf}" target="_blank" class="flex-1 text-center px-4 py-2 text-xs bg-red-50 text-red-600 font-bold rounded-xl active:bg-red-100 hover:bg-red-100 transition">PDF داگرتن</a>
            ${f.word ? `<a href="${f.word}" target="_blank" class="flex-1 text-center px-4 py-2 text-xs bg-blue-50 text-blue-600 font-bold rounded-xl active:bg-blue-100 hover:bg-blue-100 transition">Word</a>` : ''}
          </div>
        </div>`;
    }

    function selectForm(id, pdfUrl, formName) {
      selectedFormId = id;
      renderFormsList(); // highlight active
      
      const embedUrl = pdfUrl.replace('/view', '/preview');

      // Desktop Preview Logic
      if (window.innerWidth >= 768) {
        document.getElementById('preview-placeholder').classList.add('hidden');
        const frame = document.getElementById('viewer-frame');
        
        document.getElementById('desktop-preview-title').innerText = formName;
        document.getElementById('desktop-preview-header').classList.remove('hidden');
        document.getElementById('desktop-preview-header').classList.add('flex');
        
        frame.classList.remove('hidden');
        frame.src = embedUrl;
      } 
      // Mobile Preview Logic
      else {
        const modal = document.getElementById('mobile-preview-modal');
        const frame = document.getElementById('mobile-viewer-frame');
        
        document.getElementById('mobile-preview-title').innerText = formName;
        frame.src = embedUrl;
        
        modal.classList.remove('hidden');
        setTimeout(() => { modal.classList.remove('translate-y-full'); }, 10);
      }
    }

    function closeMobilePreview() {
      const modal = document.getElementById('mobile-preview-modal');
      modal.classList.add('translate-y-full');
      setTimeout(() => {
        modal.classList.add('hidden');
        document.getElementById('mobile-viewer-frame').src = "";
      }, 300);
    }

    function closeMobilePreviewAndOpenSend() {
      closeMobilePreview();
      setTimeout(() => { openSendModal(); }, 350);
    }

    async function submitEmail() {
      const status = document.getElementById('action-status');
      const btnText = document.getElementById('send-btn-text');
      
      if(selectedFormId === null) {
        status.className = "text-sm text-center font-bold text-red-500";
        status.innerText = "سەرەتا فۆڕمێک دیاری بکە!";
        return;
      }

      let payload = { formId: selectedFormId, sendType: currentSendMode };

      if (currentSendMode === 'custom') {
        const email = document.getElementById('input-custom-email').value;
        if (!email.includes('@')) {
           status.className = "text-sm text-center font-bold text-red-500";
           status.innerText = "ئیمەیلێکی ڕاستەقینە بنووسە!";
           return;
        }
        payload.targetEmail = email;
      } else {
        payload.targetEmail = document.getElementById('dept-selector').value;
        payload.code = document.getElementById('access-code') ? document.getElementById('access-code').value : "";
      }

      btnText.innerText = "خەریکی ناردنە...";
      status.innerText = "";

      try {
        const res = await fetch(API_ENDPOINT, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        
        status.className = `text-sm text-center font-bold ${result.success ? 'text-green-600' : 'text-red-500'}`;
        status.innerText = result.message;
        
        if(result.success) {
          if(document.getElementById('access-code')) document.getElementById('access-code').value = "";
          document.getElementById('input-custom-email').value = "";
          setTimeout(() => { closeSendModal(); }, 2500); // Close automatically after success
        }
      } catch (err) {
        status.className = "text-sm text-center font-bold text-red-500";
        status.innerText = "هەڵەیەک ڕوویدا، دڵنیابە لە هێڵی ئینتەرنێتەکەت.";
      } finally {
        btnText.innerText = "بەردەوام بە بۆ ناردن";
      }
    }
  </script>
</body>
</html>
